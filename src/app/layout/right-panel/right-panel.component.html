<div class="right-panel">

  <!-- CONTENT -->
  <div class="panel-content">
    <!-- PREVIEW -->
    <div *ngIf="activeView === 'preview'" class="preview-card">
      <iframe *ngIf="previewUrl" [src]="previewUrl | safeUrl" class="pdf-viewer"></iframe>
    </div>
    <!-- METADATA + COMMENTS -->
    <div class="Meta" *ngIf="activeView === 'metadata' || activeView === 'comments'">
      <!-- HEADER -->
      <div class="meta-header">
        <h3>Document Details</h3>
        <button mat-icon-button (click)="editMode = !editMode" *ngIf="activeView === 'metadata'">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button (click)="toggleMetaComment()">

          <mat-icon>
            {{ activeView === 'metadata' ? 'chat' : 'info' }}
          </mat-icon>

        </button>

      </div>

      <!-- METADATA -->
      <div *ngIf="activeView === 'metadata'"
           class="meta-card">

        <div class="meta-grid">

          <div class="meta-row"
               *ngFor="let field of metadataFields">

            <span class="label">
              {{ field.label }}
            </span>

            <span class="metavalue" *ngIf="!editMode">
              {{ field.value }}
            </span>

            <input
              *ngIf="editMode"
              [(ngModel)]="field.value">

          </div>

        </div>

        <!-- SAVE -->
        <button
          *ngIf="editMode"
          class="save-btn"
          mat-raised-button
          color="primary">

          Save Changes

        </button>

      </div>

      <!-- COMMENTS -->
      <div *ngIf="activeView === 'comments'" class="comment-card">

        <!-- COMMENT LIST -->
        <div class="comment-list">

          <div class="comment-item"
               *ngFor="let c of comments">

            <div class="avatar">
              {{ c.user[0] }}
            </div>

            <div class="comment-body">

              <div class="meta">

                <b>{{ c.user }}</b>

                <span>{{ c.time }}</span>

              </div>

              <p>{{ c.text }}</p>

            </div>

          </div>

        </div>

        <!-- INPUT -->
        <div class="comment-input">

          <input
            placeholder="Write a comment..."
            [(ngModel)]="newComment"
            (keyup.enter)="addComment()">

          <button
            mat-icon-button
            (click)="addComment()">

            <mat-icon>send</mat-icon>

          </button>

        </div>

      </div>

    </div>

  </div>

</div>
