<div class="breadcrumb">

  <!-- HOME -->
  <mat-icon class="home-icon">home</mat-icon>

  <!-- ITEMS -->
  <ng-container *ngFor="let item of items; let i = index">

    <span class="crumb"
          [class.active]="i === items.length - 1">
      {{ item }}
    </span>

    <mat-icon *ngIf="i !== items.length - 1"
              class="sep-icon">
      chevron_right
    </mat-icon>

  </ng-container>


</div>
