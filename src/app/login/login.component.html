
<div class="login-bg">

  <div class="glass-card">

    <!-- Left Visual Side -->
    <div class="left-panel">
      <div class="brand">
        <h1>DMS</h1>
        <p>Document Management System</p>
      </div>

      <div class="illustration">
        🔐
      </div>

      <p class="tagline">
        Secure • Fast • Reliable
      </p>
    </div>

    <!-- Right Login Form -->
    <div class="right-panel">

      <h2>Sign In</h2>
      <p class="sub">Welcome back, please login to continue</p>

      <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">

        <mat-form-field appearance="outline" class="full">
          <mat-label>Username</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input matInput 
           [(ngModel)]="username" 
           name="username" 
           required
           #usernameRef="ngModel">
           <mat-error *ngIf="usernameRef.invalid && usernameRef.touched">
      Username is required
    </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>

          <input matInput 
           [type]="hide ? 'password' : 'text'"
           [(ngModel)]="password"
           name="password"
           required
           #passwordRef="ngModel">
            
          <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
            <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="passwordRef.invalid && passwordRef.touched">
      Password is required
    </mat-error>
        </mat-form-field>

        <div class="row">
          <mat-checkbox>Remember</mat-checkbox>
          <a class="link">Forgot?</a>
        </div>

        <button mat-raised-button class="btn" type="submit">
          Login
        </button>

        <div class="divider">OR</div>

        <button mat-stroked-button class="google">
          <mat-icon>login</mat-icon> Continue with Google
        </button>

      </form>

    </div>

  </div>

</div>
